# Legal Vault Configuration
# Copy to config/config.yaml

app:
  name: legal-vault
  version: 1.0.0

# SMTP Server Configuration
smtp:
  listen: "0.0.0.0:2525"
  hostname: "archive.yourdomain.com"
  relay_mode: true

# Storage Configuration (On-Premise)
storage:
  type: "minio"
  endpoint: "minio:9000"
  bucket: "archives"

# Crypto Configuration
crypto:
  algorithm: "AES-256-GCM"
  key_path: "/keys"

# Search Configuration
search:
  fts_enabled: true
