version: '3.8'

services:
  legal-vault:
    image: legal-vault/agent:latest
    ports:
      - "2525:2525"  # SMTP
      - "8080:8080"  # HTTP API
    volumes:
      - ./config:/etc/legal-vault
      - ./data:/data
      - ./keys:/keys
    environment:
      - CONFIG_FILE=/etc/legal-vault/config.yaml
      - LOG_LEVEL=info
    depends_on:
      - minio
    restart: unless-stopped
    networks:
      - legal-vault-net

  minio:
    image: minio/minio:latest
    command: server /data --worm --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    restart: unless-stopped
    networks:
      - legal-vault-net

networks:
  legal-vault-net:
    driver: bridge
